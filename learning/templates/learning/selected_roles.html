{% extends "learning_base.html" %}
{% load widget_tweaks %}

{% block content %}

<div class="inner-box">

    <div class="role-list">
        {% for role in roles %}
            <div class="role-item">
                <input
                    type="text"
                    class="primary-input role-input mb-3"
                    value="{{ role.title }}"
                    readonly
                >
                <i class="fa-solid fa-trash delete-btn"></i>
            </div>
        {% endfor %}
     </div>
    
    <div>
        <p class="primary-description mb-3">
            discover a new role
        </p>
        <form method="POST">
            {% csrf_token %}
            {{ form.title|add_class:"primary-input"|attr:"placeholder:Job title" }}
            <button type="submit" class="primary-btn mt-4">
                Add
            </button>
        </form>  
    </div>   
       
</div>

{% endblock %}
