{% extends "auth_base.html" %}
{% load widget_tweaks %}
{% load static %}

{% block content %}

<form method="POST">

    {% csrf_token %}

    <div class="inner-box-small mt-5">  
        
        <div class="mt-4"></div>
             
        <label for="id_email" class="auth-label mt-5">
            e-mail address
        </label>

        {{ form.email|add_class:"primary-input"|attr:"placeholder:" }}
        {% for error in form.email.errors %}
            <p class="form-error">{{ error }}</p>
        {% endfor %}        
        
    </div>

    <div class="button-footer">
        <button type="submit" class="primary-btn">
            reset password
        </button>
    </div>

</form> 

{% endblock %}
